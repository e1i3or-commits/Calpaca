name: Bug report
description: Report a reproducible problem in Calpaca
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Do not include credentials, calendar contents, invitation tokens, or personal data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. Open …
        2. Configure …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Calpaca version
      description: Commit SHA, tag, or container image identifier.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Local development
        - Docker Compose
        - Other self-hosted
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, Bun version, PostgreSQL version, and relevant proxy details.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove secrets, tokens, email addresses, calendar data, and database URLs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed secrets and personal information from this report.
          required: true
